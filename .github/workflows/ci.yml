name: Smart Factory Twin - OS & OT CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  ros2-colcon-build-verification:
    runs-on: ubuntu-22.04  # 기범 님의 호스트 환경과 완전 매핑되는 최적의 러너 스펙

    steps:
    - name: 1. 소스 코드 체크아웃
      uses: actions/checkout@v4

    - name: 2. Docker 빌드엔진(Buildx) 설정
      uses: docker/setup-buildx-action@v3

    - name: 3. 효율적 컴파일을 위한 Docker 레이어 캐시 활성화
      uses: actions/cache@v3
      with:
        path: /tmp/.build-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: 4. ROS2 Humble 환경 격리 컨테이너 빌드 가동
      # ROS2 Dockerfile의 colcon build 레이어까지 실행하여 빌드 오류를 가로챔
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./ros2_ws/Dockerfile
        tags: smart-factory-ci-agent:latest
        push: false  # 로컬 러너 내부 검증용이므로 외부 레지스트리에 푸시하지 않음
        cache-from: type=local,src=/tmp/.build-cache
        cache-to: type=local,dest=/tmp/.build-cache-new,mode=max

    # 캐시 비대화 방지를 위한 정리 레이어
    - name: 5. 도커 빌드 캐시 갱신 정합
      run: |
        rm -rf /tmp/.build-cache
        mv /tmp/.build-cache-new /tmp/.build-cache