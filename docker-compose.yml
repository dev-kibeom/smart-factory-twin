version: '3.8'

networks:
  it_lan_net:       # Layer 4 비즈니스/트랜잭션 평면 전용 내부 격리 네트워크
    driver: bridge
  ot_field_net:    # Layer 0-2 물리 제어 및 시뮬레이션 평면 전용 네트워크
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16

services:
  # ---------------------------------------------------------------------------
  # [IT 평면] 데이터베이스 이원화 스택
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: sf_postgres_db
    environment:
      POSTGRES_USER: carbon_admin
      POSTGRES_PASSWORD: secure_password_1234
      POSTGRES_DB: carbon_db
    volumes:
      - ./volumes/postgres_data:/var/lib/postgresql/data
    networks:
      - it_lan_net
    # ports 섹션을 완전히 제거하고 expose만 선언하여 호스트(외부) 포트 오픈을 불허함
    expose:
      - "5432"

  influxdb:
    image: influxdb:2.7-alpine
    container_name: sf_influx_tsdb
    ports:
      - "8086:8086"
    volumes:
      - ./volumes/influxdb_data:/var/lib/influxdb2
    networks:
      - it_lan_net
      - ot_field_net

  # ---------------------------------------------------------------------------
  # [IT 평면] 비즈니스 트랜잭션 게이트웨이 (FastAPI)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sf_fastapi_gateway
    ports:
      - "8000:8000"  # 외부 Next.js 대시보드와의 통신 웹 세션 허용
    environment:
      - DATABASE_URL=postgresql://carbon_admin:secure_password_1234@postgres:5432/carbon_db
      - INFLUXDB_URL=http://influxdb:8086
    depends_on:
      - postgres
    networks:
      - it_lan_net
      - ot_field_net

  # ---------------------------------------------------------------------------
  # [OT/IT 경계 평면] 분산 이벤트 브로커 (Eclipse Mosquitto MQTT)
  # ---------------------------------------------------------------------------
  mqtt_broker:
    image: eclipse-mosquitto:latest
    container_name: sf_mqtt_broker
    ports:
      - "1883:1883"  
    volumes:
      - ./volumes/mqtt_config:/mosquitto/config
      - ./volumes/mqtt_data:/mosquitto/data
      - ./volumes/mqtt_log:/mosquitto/log
    networks:
      it_lan_net:      # IT 망은 도커가 알아서 유동 IP 부여
      ot_field_net:    # [핵심 교정] ROS2와 통신할 OT 폐쇄망에는 고정 IP 주소를 강제 낙인
        ipv4_address: 172.20.0.10
    restart: always

  # ---------------------------------------------------------------------------
  # [OT 평면] ROS2 Humble + Gazebo 시뮬레이션 컨테이너
  # ---------------------------------------------------------------------------
  ros2_simulation:
    build:
      context: .  
      dockerfile: ./ros2_ws/Dockerfile
    container_name: sf_ros2_humble_workspace
    privileged: true
    tty: true
    stdin_open: true
    networks:
      - ot_field_net
    environment:
      DISPLAY: ${DISPLAY}             
      QT_X11_NO_MITSHM: "1"             
      XLA_PYTHON_CLIENT_PREALLOCATE: "false"  
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw  
      - ./ros2_ws/src:/workspace/ros2_ws/src 
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility, compute]

  # ---------------------------------------------------------------------------
  # [OT 평면] 가상 Soft-PLC 환경 (OpenPLC)
  # ---------------------------------------------------------------------------
  openplc:
    image: alpine:latest # 실제 구현 시 OpenPLC 패키징 반영
    container_name: sf_openplc_runtime
    ports:
      - "502:502"   # Modbus TCP 포트 바인딩
      - "4840:4840" # OPC UA 서버 포트 바인딩
    networks:
      - ot_field_net