version: '3.8'

networks:
  it_lan_net:       # Layer 4 비즈니스/트랜잭션 평면 전용 내부 격리 네트워크
    driver: bridge
  ot_field_net:    # Layer 0-2 물리 제어 및 시뮬레이션 평면 전용 네트워크
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16

services:
  # ---------------------------------------------------------------------------
  # [IT 평면] 데이터베이스 이원화 스택
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: sf_postgres_db
    environment:
      POSTGRES_USER: carbon_admin
      POSTGRES_PASSWORD: secure_password_1234
      POSTGRES_DB: carbon_db
    volumes:
      - ./volumes/postgres_data:/var/lib/postgresql/data
    networks:
      - it_lan_net
    expose:
      - "5432"

  influxdb:
    image: influxdb:2.7-alpine
    container_name: sf_influx_tsdb
    ports:
      - "8086:8086"
    volumes:
      - ./volumes/influxdb_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=carbon_admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=secure_password_1234
      - DOCKER_INFLUXDB_INIT_ORG=smart_factory_org
      - DOCKER_INFLUXDB_INIT_BUCKET=robot_telemetry_bucket
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=super_secret_influxdb_token_12345
    networks:
      - it_lan_net
      - ot_field_net

  # ---------------------------------------------------------------------------
  # [IT 평면] 비즈니스 트랜잭션 게이트웨이 (FastAPI)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sf_fastapi_gateway
    ports:
      - "8000:8000"  # 외부 Next.js 대시보드와의 통신 웹 세션 허용
    environment:
      - DATABASE_URL=postgresql://carbon_admin:secure_password_1234@postgres:5432/carbon_db
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=super_secret_influxdb_token_12345
      - INFLUXDB_ORG=smart_factory_org
      - INFLUXDB_BUCKET=robot_telemetry_bucket
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
    networks:
      - it_lan_net
      - ot_field_net

  # ---------------------------------------------------------------------------
  # [OT/IT 경계 평면] 분산 이벤트 브로커 (Eclipse Mosquitto MQTT)
  # ---------------------------------------------------------------------------
  mqtt_broker:
    image: eclipse-mosquitto:latest
    container_name: sf_mqtt_broker
    ports:
      - "1883:1883"  
    volumes:
      - ./volumes/mqtt_config:/mosquitto/config
      - ./volumes/mqtt_data:/mosquitto/data
      - ./volumes/mqtt_log:/mosquitto/log
    networks:
      it_lan_net:      
      ot_field_net:    
        ipv4_address: 172.20.0.10
    restart: always

  # ---------------------------------------------------------------------------
  # [OT 평면] ROS2 Humble + Gazebo 시뮬레이션 컨테이너 (X11 및 마운트 완정 복구)
  # ---------------------------------------------------------------------------
  ros2_simulation:
    build:
      context: .  
      dockerfile: ./ros2_ws/Dockerfile
    container_name: sf_ros2_humble_workspace
    privileged: true
    tty: true
    stdin_open: true
    depends_on:
      - openplc # OpenPLC 가 가동된 후 ROS2 가 뜨도록 생명주기 제어
    links:
      - openplc:openplc # openplc 라는 호스트명 별칭을 네트워크 버스에 정격 등록
    networks:
      - ot_field_net
    environment:
      - DISPLAY=${DISPLAY}             
      - QT_X11_NO_MITSHM=1             
      - XLA_PYTHON_CLIENT_PREALLOCATE=false  
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      # 🔌 [핫픽스 수복] 컨테이너 내부 그래픽스 레이어가 호스트 권한 쿠키를 추종하도록 매핑
      - XAUTHORITY=/tmp/.Xauthority
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw  
      # 🔌 [핫픽스 수복] 호스트 마스터 X11 쿠키를 컨테이너 임시 디렉토리로 안전 패스스루
      - ~/.Xauthority:/tmp/.Xauthority:ro
      # 🔌 [정격 최적화] 내부 colcon 빌드 환경 유전 정합을 위해 워크스페이스 통짜 통합 볼륨 매핑
      - ./ros2_ws:/workspace/ros2_ws
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility, compute]

  # ---------------------------------------------------------------------------
  # [OT 평면] 가상 Soft-PLC 환경 (OpenPLC)
  # ---------------------------------------------------------------------------
  openplc:
    image: python:3.10-slim
    container_name: sf_openplc_runtime
    ports:
      # - "502:502"   
      - "4840:4840" 
    networks:
      - ot_field_net
    # 🔌 [인프라 핵심 수복] 백그라운드에 상주하며 ns=2;s=PLC_Loading_Done 노드를 에뮬레이션하는 인라인 스크립트 가동
    entrypoint:
      - "python3"
      - "-c"
      - |
        import time
        try:
            import asyncua
        except ImportError:
            import os
            os.system("pip install asyncua")
        
        from asyncua import Server
        import asyncio

        async def main():
            server = Server()
            await server.init()
            server.set_endpoint("opc.tcp://0.0.0.0:4840/freeopcua/server/")
            
            # 주소 장부 네임스페이스 및 노드 락인 등록
            idx = await server.register_namespace("http://openplc.project")
            myobj = await server.nodes.objects.add_object(idx, "MyPLCVariables")
            
            # ROS2 브릿지 노드가 타격할 수수 레지스터 변수 사전 선언 생성
            heartbeat = await myobj.add_variable(idx, "AMR_Heartbeat", 0)
            arrived = await myobj.add_variable(idx, "AMR_Arrived", False)
            loading_done = await myobj.add_variable(idx, "PLC_Loading_Done", True) # 테스트를 위해 일단 TRUE 수전 고정
            
            await arrived.set_writable()
            await heartbeat.set_writable()
            await loading_done.set_writable()
            
            print("🏭 [MOCK PLC] 4840 포트 상에서 가상 산업용 OPC UA 서버 가동 안착.")
            await server.start()
            try:
                while True:
                    await asyncio.sleep(1)
            finally:
                await server.stop()

        asyncio.run(main())